spring:
  application:
    name: PICCOLO_CIMITERO_MONUMENTALE
  datasource:
    url: jdbc:mysql://localhost:3306/PICCOLO_CIMITERO_MONUMENTALE
    username: webappuser
    password: webapppassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect
          show_sql: true
          format_sql: true
          # Forza Hibernate a usare ESATTAMENTE le stringhe passate in @Table e @Column
          id:
            new_generator_mappings: true